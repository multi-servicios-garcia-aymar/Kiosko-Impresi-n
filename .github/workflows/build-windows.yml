name: "Generar Instalador Windows (.exe)"

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Rust (Stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Instalar dependencias web
        run: npm install

      - name: Compilar App y Generar .exe (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
           # Este token es provisto automáticamente por GitHub
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'Kiosko de Fotos v__VERSION__'
          releaseBody: 'Instalador oficial para Windows (.exe) generado automáticamente.'
          releaseDraft: false
          prerelease: false
