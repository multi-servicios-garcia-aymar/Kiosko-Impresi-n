<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Foto Estudio App - Centro de Impresión Fotográfica Profesional. Configura, diseña e imprime tus fotos para documentos, pasaportes y postales con tecnología de IA avanzada." />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Foto Estudio">
    
    <!-- Open Graph / Social Media -->
    <meta property="og:title" content="Foto Estudio App - Impresión Profesional" />
    <meta property="og:description" content="Centro de Impresión Profesional con IA. Calidad fotográfica milimétrica desde cualquier dispositivo." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icon.svg" />
    
    <meta name="author" content="Foto Estudio Team" />
    <meta name="robots" content="index, follow" />
    
    <!-- Cache Control: Avoid stale application state -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <title>Foto Estudio App - Centro de Impresión</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Global Error Handler for hashed assets
      // If a script load fails (404 on old hash), force a cache-free reload
      window.addEventListener('error', function(e) {
        if (e.target.tagName === 'SCRIPT' || e.target.tagName === 'LINK') {
          console.warn('Recurso no encontrado, forzando recarga de actualización...');
          window.location.reload();
        }
      }, true);

      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => {
              console.log('Service Worker registrado');
              
              // Detect new service worker versions
              reg.onupdatefound = () => {
                const installingWorker = reg.installing;
                installingWorker.onstatechange = () => {
                  if (installingWorker.state === 'installed') {
                    if (navigator.serviceWorker.controller) {
                      // New content is available, inform the user or reload
                      console.log('Nueva versión disponible, recargando...');
                      window.location.reload();
                    }
                  }
                };
              };
            })
            .catch(err => console.log('Fallo al registrar Service Worker:', err));
        });

        // Controller change detection
        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (!refreshing) {
            window.location.reload();
            refreshing = true;
          }
        });
      }
    </script>
  </body>
</html>
